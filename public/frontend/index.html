<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InfoPanel — Aeropuerto & Trenes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

  <header class="app-header" id="app-header">
    <div class="header-brand">
      <span class="brand-icon">✈</span>
      <span class="brand-name">INFO<span class="brand-accent">PANEL</span></span>
    </div>
    <nav class="header-nav" id="header-nav">
      <a href="#tablero" class="nav-link" data-route="tablero">Tablero</a>
      <a href="#admin" class="nav-link js-protected" data-route="admin" data-role="GESTOR">Administración</a>
      <a href="#usuarios" class="nav-link js-protected" data-route="usuarios" data-role="GESTOR">Usuarios</a>
    </nav>
    <div class="header-session" id="header-session"></div>
  </header>

  <main class="app-main" id="app-main"></main>

  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-box" id="modal-box">
      <button class="modal-close" id="modal-close" aria-label="Cerrar">&times;</button>
      <div class="modal-content" id="modal-content"></div>
    </div>
  </div>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="js/patterns/EventBus.js"></script>
  <script src="js/ui-helpers.js"></script>
  <script src="js/patterns/DataFactory.js"></script>

  <script src="js/models/usuario.js"></script>
  <script src="js/models/operador.js"></script>
  <script src="js/models/punto.js"></script>
  <script src="js/models/operacion.js"></script>

  <script src="js/services/StorageService.js"></script>
  <script src="js/services/ApiService.js"></script>
  <script src="js/services/UsuarioService.js"></script>
  <script src="js/services/OperadorService.js"></script>
  <script src="js/services/PuntoService.js"></script>
  <script src="js/services/OperacionService.js"></script>


  <script src="js/views/SessionView.js"></script>
  <script src="js/views/LoginView.js"></script>
  <script src="js/views/RegisterView.js"></script>
  <script src="js/views/TableroView.js"></script>
  <script src="js/views/AdminView.js"></script>
  <script src="js/views/UsuariosView.js"></script>

  <script src="js/router/Router.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
