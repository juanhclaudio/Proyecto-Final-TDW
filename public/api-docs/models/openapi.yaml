        '404':
          $ref: '#/components/responses/Response_404'
    put:
      tags:
        - '✈️ Operations'
      summary: Updates the Operation resource.
      description: |
        Updates the Operation identified by `operationId`. Requires `GESTOR` role.
        Allows updating: `tipo`, `codigo`, `sentido`, `origen`, `destino`, `horaProgramada`, `horaEstimada`, `estado`, `operadorId`, `puntoId`.
      operationId: updateOperation
      security:
        - MiWApiSecurity: [ gestor ]
      requestBody:
        $ref: '#/components/requestBodies/UpdateOperacionRequestBody'
      parameters:
        - $ref: '#/components/parameters/ifMatchParam'
      responses:
        '209':
          description: '`CONTENT RETURNED`: Operation previously existed and is now updated'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operacion'
        '400':
          $ref: '#/components/responses/Response_400'
        '401':
          $ref: '#/components/responses/Response_401'
        '403':
          $ref: '#/components/responses/Response_403'
        '404':
          $ref: '#/components/responses/Response_404'
        '428':
          $ref: '#/components/responses/Response_428'
    delete:
      tags:
        - '✈️ Operations'
      summary: Removes the Operation resource.
      description: Deletes the Operation identified by `operationId`. Requires `GESTOR` role.
      operationId: deleteOperation
      security:
        - MiWApiSecurity: [ gestor ]
      responses:
        '204':
          description: '`NO CONTENT`: Operation deleted &lt;Response body is empty&gt;'
        '401':
          $ref: '#/components/responses/Response_401'
        '403':
          $ref: '#/components/responses/Response_403'
        '404':
          $ref: '#/components/responses/Response_404'

components:
  schemas:
    User:
      type: object
      properties:
        id:
          description: User Id
          type: integer
          format: int64
          readOnly: true
        email:
          description: User email
          type: string
          format: email
        role:
          description: User role
          type: string
          # default: PUBLICO
          enum:
            - INACTIVO
            - PUBLICO
            - GESTOR
        # _links:
        #   description: link relations
        #   type: object
        #   properties:
        #     parent:
        #       type: object
        #       properties:
        #         href:
        #           type: string
        #           format: url
        #     self:
        #       type: object
        #       properties:
        #         href:
        #           type: string
        #           format: url
      examples:
        - user:
            id: 1508
            email: miw.etsisi@upm.es
            role: PUBLICO
            # _links:
            #   parent:
            #     href: /api/v1/users
            #   self:
            #     href: /api/v1/users/1508
      description: ''
      x-examples:
        example-1:
          user:
            id: 1508
            email: miw.etsisi@upm.es
            role: PUBLICO
            # _links:
            #   parent:
            #     href: /api/v1/users
            #   self:
            #     href: /api/v1/users/1508
    Operator:
      type: object
      properties:
        id:
          description: Operator Id
          type: integer
          format: int64
          readOnly: true
        nombre:
          description: Operator name
          type: string
          maxLength: 80
        siglas:
          description: Operator acronym
          type: string
          maxLength: 6
        color:
          description: Operator color
          type: string
          maxLength: 20
        urlIcono:
          description: Operator icon url
          type: string
          maxLength: 2047
          format: url
        operaciones:
          description: array with the operation IDs
          type: array
          items:
            type: string
            format: ulid
      required: [ id, nombre, siglas ]
      example:
        operador:
          id: 1
          nombre: "MiW - ETSISI - UPM"
          siglas: "MiWUPM"
          color: "azul"
          urlIcono: "https://miw.etsisi.upm.es/wp-content/uploads/2021/04/miw.png"
          operaciones: [ "01KPY47KQDTNHW9N5QJ0PGP88Y", "01KPZXPWK7XT4VBCHAQ6GYKMRS" ]
    Spot:
      type: object
      properties:
        puntoId:
          description: Spot Id
          type: integer
          format: int64
          readOnly: true
        codigo:
          description: Spot name
          type: string
          maxLength: 80
        tipo:
          description: Spot type
          type: string
          maxLength: 6
      required: [ codigo, tipo ]
      example:
        punto:
          PuntoId: 2023
          tipo: "PUERTA"
          codigo: "P2023"

    Operacion:
      type: object
      properties:
        operacionId:
          description: Operation ULID (26-char Base32)
          type: string
          maxLength: 26
          readOnly: true
          example: '01KPY47KQDTNHW9N5QJ0PGP88Y'
        tipo:
          description: Operation type
          type: string
          enum:
            - vuelo
            - tren
        codigo:
          description: Operation code (max 10 chars, unique)
          type: string
          maxLength: 10
        sentido:
          description: Operation direction
          type: string
          enum:
            - salida
            - llegada
        origen:
          description: Origin (max 60 chars)
          type: string
          maxLength: 60
        destino:
          description: Destination (max 60 chars)
          type: string
          maxLength: 60
        horaProgramada:
          description: Scheduled time
          type: string
          format: date-time
          nullable: true
          example: '2025-06-01 08:30:00'
        horaEstimada:
          description: Estimated time
          type: string
          format: date-time
          nullable: true
          example: '2025-06-01 08:45:00'
        estado:
          description: Operation status
          type: string
          enum:
            - programado
            - embarcando
            - retrasado
            - cancelado
            - en ruta
            - llegado
        operadorId:
          description: ID of the associated Operator
          type: integer
          format: int64
        puntoId:
          description: ID of the associated Spot (Punto)
          type: integer
          format: int64
      required: [ tipo, codigo, sentido, origen, destino, estado, operadorId, puntoId ]
      example:
        operacion:
          operacionId: '01KPY47KQDTNHW9N5QJ0PGP88Y'
          tipo: vuelo
          codigo: 'IB1234'
          sentido: salida
          origen: 'Madrid Barajas'
          destino: 'Barcelona El Prat'
          horaProgramada: '2025-06-01 08:30:00'
          horaEstimada: '2025-06-01 08:45:00'
          estado: programado
          operadorId: 1
          puntoId: 3

    Message:
      type: object
      description: HTTP response message
      properties:
        code:
          description: Response code
          type: integer
          format: int64
        message:
          description: Response message
          type: string

  responses:
    Response_Options:
      description: '`NO CONTENT`: `ALLOW` header &lt;Response body is empty&gt;'
      headers:
        Allow:
          $ref: '#/components/headers/Allow'
    Response_400:
      description: '`BAD REQUEST`: User e-mail already exists, or role does not exist'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Message'
          examples:
            response-400:
              $ref: '#/components/examples/response-400'
    Response_401:
      description: '`UNAUTHORIZED`: invalid Authorization header'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Message'
          examples:
            response-401:
              $ref: '#/components/examples/response-401'
    Response_403:
      description: '`FORBIDDEN`: You don''t have permission to access'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Message'
          examples:
            response-403:
              $ref: '#/components/examples/response-403'
    Response_404:
      description: '`NOT FOUND`: resource not found'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Message'
          examples:
            response-404:
              $ref: '#/components/examples/response-404'
    Response_406:
      description: '`NOT ACCEPTABLE`: Requested target resource not found'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Message'
          examples:
            response-406:
              $ref: '#/components/examples/response-406'
    Response_428:
      description: '`PRECONDITION REQUIRED`: This request is required to be conditional; try using `If-Match`.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Message'
          examples:
            response-428:
              $ref: '#/components/examples/response-428'
    Response_422:
      description: '`UNPROCESSABLE ENTITY`: User e-mail or password is left out'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Message'
          examples:
            response-422:
              $ref: '#/components/examples/response-422'

  requestBodies:
    UserRequestBody:
      description: '`User` data'
      content:
        application/json:
          schema:
            type: object
            properties:
              email:
                description: User email
                type: string
                format: email
              password:
                description: User password
                type: string
                format: password
            required: [ 'email', 'password' ]
            examples:
                - email: User_email@example.com
                  password: User_password
    UpdateUserRequestBody:
      description: User data that you want to modify
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              email:
                description: new User email
                type: string
                format: email
              password:
                description: new User password
                type: string
                format: password
              role:
                description: new User role
                type: string
                enum:
                  - INACTIVO
                  - PUBLICO
                  - GESTOR
            examples:
              - email: miw.etsisi@upm.es
                password: MiW_User_password
                role: PUBLICO
    LoginRequestBody:
      description: Registered **username** and **password**
      required: true
      content:
        application/x-www-form-urlencoded:
          schema:
            type: object
            properties:
              username:
                description: User email
                type: string
              password:
                description: User password
                type: string
                format: password
              scope:
                description: Requested scopes
                type: string
                # default: publico
                enum:
                  - publico
                  - publico+gestor
            required: [ 'username', 'password' ]
        application/json:
          schema:
            type: object
            properties:
              username:
                description: User email
                type: string
              password:
                description: User password
                type: string
                format: password
              scope:
                description: Requested scopes
                type: string
                default: publico
                enum:
                  - publico
                  - publico+gestor
            required: [ 'username', 'password']
    OperacionRequestBody:
      description: '`Operacion` data'
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              tipo:
                description: Operation type
                type: string
                enum:
                  - vuelo
                  - tren
              codigo:
                description: Operation code (max 10 chars)
                type: string
                maxLength: 10
              sentido:
                description: Operation direction
                type: string
                enum:
                  - salida
                  - llegada
              origen:
                description: Origin (max 60 chars)
                type: string
                maxLength: 60
              destino:
                description: Destination (max 60 chars)
                type: string
                maxLength: 60
              horaProgramada:
                description: Scheduled time (Y-m-d H:i:s)
                type: string
                format: date-time
                nullable: true
              horaEstimada:
                description: Estimated time (Y-m-d H:i:s)
                type: string
                format: date-time
                nullable: true
              estado:
                description: Estado actual de la operación
                type: string
                enum:
                  - programado
                  - embarcando
                  - retrasado
                  - cancelado
                  - en ruta
                  - llegado
              operadorId:
                description: ID of the associated Operator
                type: integer
                format: int64
              puntoId:
                description: ID of the associated Spot (Punto)
                type: integer
                format: int64
            required: [ tipo, codigo, sentido, origen, destino, estado, operadorId, puntoId ]
    UpdateOperacionRequestBody:
      description: '`Operacion` data to update (all fields optional)'
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              tipo:
                description: New operation type
                type: string
                enum:
                  - vuelo
                  - tren
              codigo:
                description: New operation code (max 10 chars)
                type: string
                maxLength: 10
              sentido:
                description: New operation direction
                type: string
                enum:
                  - salida
                  - llegada
              origen:
                description: New origin (max 60 chars)
                type: string
                maxLength: 60
              destino:
                description: New destination (max 60 chars)
                type: string
                maxLength: 60
              horaProgramada:
                description: New scheduled time (Y-m-d H:i:s)
                type: string
                format: date-time
                nullable: true
              horaEstimada:
                description: New estimated time (Y-m-d H:i:s)
                type: string
                format: date-time
                nullable: true
              estado:
                description: Estado actual de la operación
                type: string
                enum:
                  - programado
                  - embarcando
                  - retrasado
                  - cancelado
                  - en ruta
                  - llegado
              operadorId:
                description: New ID of the associated Operator
                type: integer
                format: int64
              puntoId:
                description: New ID of the associated Spot (Punto)
                type: integer
                format: int64
    SpotRequestBody:
      description: '`Spot` data'
      content:
        application/json:
          schema:
            type: object
            properties:
              codigo:
                type: string
                maxLength: 10
              tipo:
                type: string
                maxLength: 6
            required: [ 'codigo', 'tipo' ]
    OperatorRequestBody:
      description: '`Operator` data'
      content:
        application/json:
          schema:
            type: object
            properties:
              nombre:
                type: string
                maxLength: 80
              siglas:
                type: string
                maxLength: 6
              color:
                type: string
                maxLength: 20
              urlIcono:
                type: string
                maxLength: 2047
                format: url
            required: [ 'nombre', 'siglas' ]

  parameters:
    operationId:
      name: operationId
      in: path
      description: Operation ULID (26-char Base32)
      required: true
      schema:
        type: string
        maxLength: 26
        pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
    userId:
      name: userId
      in: path
      description: ID of user
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
        pattern: ^\d+$
    useremail:
      name: useremail
      in: path
      description: User email
      required: true
      schema:
        type: string
        pattern: '^[a-zA-Z0-9()áéíóúÁÉÍÓÚñÑ@_ %$\.+-]*$'
    elementTextParam:
      name: name
      in: query
      description: Elements containing the text
      required: false
      schema:
        type: string
        pattern: '^[a-zA-Z0-9()áéíóúÁÉÍÓÚñÑ %$\.+-<>]*$'
    orderParam:
      name: order
      in: query
      description: '`id` | `nombre`'
      required: false
      allowEmptyValue: false
      schema:
        type: string
        enum:
          - id
          - nombre
    orderingParam:
      name: ordering
      in: query
      description: '`ASC` | `DESC`'
      required: false
      allowEmptyValue: false
      schema:
        type: string
        enum:
          - ASC
          - DESC
    ifMatchParam:
      name: If-Match
      in: header
      description: "ETag value of the resource you are trying to update"
      required: true
      schema:
        type: string
        pattern: "[0-9a-f]*"
    operatorId:
      name: operatorId
      in: path
      description: Operator ID
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
        pattern: ^\d+$
    operatorName:
      name: operatorName
      in: path
      description: Operator name
      required: true
      schema:
        type: string
        pattern: '^[a-zA-Z0-9()áéíóúÁÉÍÓÚñÑ %$\.+-]*$'
    operatorSearchCriteria:
      name: criterion
      in: path
      description: |-
        Set the search criteria:
        <li><b>name</b>: Search by name
        <li><b>acronym</b>: search by acronym

      required: true
      schema:
        type: string
        enum:
          - name
          - acronym
    spotId:
      name: spotId
      in: path
      description: Spot ID
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
        pattern: ^\d+$
    spotName:
      name: spotName
      in: path
      description: Spot name
      required: true
      schema:
        type: string
        pattern: '^[a-zA-Z0-9()áéíóúÁÉÍÓÚñÑ %$\.+-]*$'

  headers:
    Authorization:
      description: Authorization header with access token
      schema:
        type: string
        example:
          "Authorization: Bearer <JWT>"
    ETag:
      description: Entity Tag (unique identifier provided for cache validation)
      schema:
        type: string
        pattern: "[0-9a-f]*"
        example:
          "ETag: d6f3191f5c8f0e3fced7f9cbd1a753d9"
    Location:
      description: '`URI` of the new resource'
      schema:
        type: string
        format: url
        example:
          "Location: /api/v1/products/2023"
    Allow:
      description: List of HTTP supported methods
      schema:
        type: string
        example:
          "Allow: OPTIONS, GET, HEAD, POST"

  examples:
    response-400:
      value:
        code: 400
        message: 'BAD REQUEST: user e-mail already exists'
    response-401:
      value:
        code: 401
        message: 'UNAUTHORIZED: invalid Authorization header'
    response-403:
      value:
        code: 403
        message: "FORBIDDEN: You don't have permission to access"
    response-404:
      value:
        code: 404
        message: "NOT FOUND: Resource not found (or you don't have permission to access)"
    response-406:
      value:
        code: 406
        message: 'NOT ACCEPTABLE: Requested resource not found'
    response-428:
      value:
        code: 428
        message: 'PRECONDITION REQUIRED: This request is required to be conditional; try using `If-Match`.'
    response-422:
      value:
        code: 422
        message: 'UNPROCESSABLE ENTITY: name, e-mail or password is left out'

  securitySchemes:
    MiWApiSecurity:
      type: oauth2
      description: 'This API uses OAuth2 with the implicit grant flow. [More info](https://api.example.com/docs/auth)'
      bearerFormat: JWT
      flows:
        password:
          tokenUrl: /access_token
          scopes:
            publico: 'Permissions: (read) [ User, ... ]'
            gestor: 'can also: (create, read, update, delete) [ User, ... ]'
